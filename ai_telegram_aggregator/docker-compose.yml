version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: news
      POSTGRES_USER: news
      POSTGRES_PASSWORD: news
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql+asyncpg://news:news@postgres:5432/news
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  bot:
    build: .
    command: ["python", "-m", "app.bot.bot_runner"]
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql+asyncpg://news:news@postgres:5432/news
    depends_on:
      - api

volumes:
  pg_data:
